name: keypool health check

# Automatic key health-check: probes every key, revives recovered ones, disables
# dead ones. Use this when the Cloudflare cron-trigger slots are full.
#
# Set two repo secrets (Settings → Secrets and variables → Actions):
#   KEYPOOL_URL          e.g. https://your-worker.example.com
#   KEYPOOL_ADMIN_TOKEN  the ADMIN_TOKEN secret

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 min (GitHub may delay scheduled runs)
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: probe all keys (revive / disable)
        env:
          KEYPOOL_URL: ${{ secrets.KEYPOOL_URL }}
          KEYPOOL_ADMIN_TOKEN: ${{ secrets.KEYPOOL_ADMIN_TOKEN }}
        run: |
          if [ -z "$KEYPOOL_URL" ] || [ -z "$KEYPOOL_ADMIN_TOKEN" ]; then
            echo "Set KEYPOOL_URL and KEYPOOL_ADMIN_TOKEN repo secrets."; exit 1
          fi
          curl -sS -X POST "$KEYPOOL_URL/admin/check-all-keys" \
            -H "Authorization: Bearer $KEYPOOL_ADMIN_TOKEN" \
            --max-time 110
